name: Reviewapp CICD-Pipeline

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code 
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Build Source Code 
      run: mvn clean install -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/reviewapp:${{ github.run_number }} .

    - name: Push to Docker Hub 
      run: docker push ${{ secrets.DOCKER_USERNAME }}/reviewapp:${{ github.run_number }}

    - name: AWS Credentials 
      uses: aws-actions/configure-aws-credentials@v6
      with: 
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Update EKS Kubeconfig File
      run: aws eks update-kubeconfig --name cicd-lab --region ap-south-1

    - name: Rolling Update with deployment
      run: kubectl set image deployment/reviewapp-dep reviewapp=${{ secrets.DOCKER_USERNAME }}/reviewapp:${{ github.run_number }}
        
